name: Postman API and Data Validation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Newman and Reporters
        run: npm install newman newman-reporter-htmlextra newman-reporter-allure@2.0.0

      - name: Run API Tests
        run: npx newman run "TMDB_API_Tests.postman_collection.json" --environment TMDB.postman_environment.json --env-var "api_key=${{ secrets.TMDB_API_KEY }}" --env-var "base_url=https://api.themoviedb.org/3" --reporters cli,htmlextra,allure --reporter-htmlextra-export reports/test-report.html --reporter-allure-resultsDir allure-results
      
      - name: Run API Mock Tests
        run: npx newman run "TMDB_API_Tests_Mock_Server.postman_collection.json" --environment TMDB_Mock_Server.postman_environment.json --env-var "api_key=${{ secrets.TMDB_API_KEY }}" --env-var "base_url=https://6cd6cc6f-9516-431b-bebb-a37a90e7421f.mock.pstmn.io" --reporters cli,htmlextra,allure --reporter-htmlextra-export reports/test-report-mock.html --reporter-allure-resultsDir allure-results-mock

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
  
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report
        if: always()

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
  
  db-validation:
    runs-on: ubuntu-latest
  
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmdb_validation
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps: 

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv requests

      - name: Create schema
        run: psql -h localhost -U postgres -d tmdb_validation -f db/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run Ingestion
        env: 
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DB_HOST: localhost
          DB_NAME: tmdb_validation
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
        run: python db/ingest.py
        
      - name: Run Validation Tests
        env: 
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DB_HOST: localhost
          DB_NAME: tmdb_validation
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
        run: pytest db/validate.py -v
        